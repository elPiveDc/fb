<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Navigation HUD</title>

    <!-- Leaflet -->

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- CSS propio -->

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- =================================================
     CAMARA + HUD
================================================== -->

    <div id="camera-container">
      <video id="camera" autoplay playsinline muted></video>

      <div id="overlay">
        <!-- ==========================
             INFORMACION GPS
        =========================== -->

        <div id="info-panel">
          <div>
            <strong>Hora:</strong>

            <span id="time"> --:--:-- </span>
          </div>

          <div>
            <strong>Lat:</strong>

            <span id="latitude"> --- </span>
          </div>

          <div>
            <strong>Lon:</strong>

            <span id="longitude"> --- </span>
          </div>

          <div>
            <strong>Alt:</strong>

            <span id="altitude"> --- </span>
          </div>

          <div>
            <strong>Precisión:</strong>

            <span id="accuracy"> --- </span>
          </div>

          <div>
            <strong>Velocidad:</strong>

            <span id="speed"> --- </span>
          </div>

          <div>
            <strong>Distancia:</strong>

            <span id="distance"> --- </span>
          </div>

          <div>
            <strong>ETA:</strong>

            <span id="eta"> --- </span>
          </div>
        </div>

        <!-- ==========================
             BRUJULA
        =========================== -->

        <div id="compass-panel">
          <div id="compass">🧭</div>

          <div id="heading">0°</div>
        </div>

        <!-- ==========================
             NAVEGACION HUD
        =========================== -->

        <div id="navigation">
          <div id="arrow">↑</div>

          <div id="street">Buscando calle...</div>

          <div id="instruction">Seleccione un destino</div>
        </div>
      </div>
    </div>

    <!-- =================================================
     MAPA
================================================== -->

    <div id="map-container">
      <div id="map"></div>

      <!-- Expandir mapa -->

      <button id="map-size-btn">⛶</button>

      <!-- Cambiar tema -->

      <button id="map-theme-btn">🌙</button>
    </div>

    <!-- =================================================
     LIBRERIAS
================================================== -->

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- =================================================
     LOGICA
================================================== -->

    <script src="map.js"></script>

    <script src="app.js"></script>
  </body>
</html>
