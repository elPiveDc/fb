<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"
    />

    <meta name="theme-color" content="#000000" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Navigation HUD</title>

    <!-- Leaflet -->

    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />

    <link
      rel="preconnect"
      href="https://routing.openstreetmap.de"
      crossorigin
    />

    <link
      rel="preconnect"
      href="https://nominatim.openstreetmap.org"
      crossorigin
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- =====================================================
     CAMARA
====================================================== -->

    <div id="camera-container">
      <video id="camera" autoplay playsinline muted></video>

      <!-- =====================================================
         HUD
    ====================================================== -->

      <div id="overlay">
        <!-- =============================================
             PANEL INFORMACIÓN
        ============================================== -->

        <div id="info-panel">
          <div><strong>Hora:</strong> <span id="time">--:--:--</span></div>

          <div><strong>Lat:</strong> <span id="latitude">---</span></div>

          <div><strong>Lon:</strong> <span id="longitude">---</span></div>

          <div><strong>Alt:</strong> <span id="altitude">---</span></div>

          <div><strong>Precisión:</strong> <span id="accuracy">---</span></div>

          <div><strong>Velocidad:</strong> <span id="speed">---</span></div>

          <div><strong>Distancia:</strong> <span id="distance">---</span></div>

          <div><strong>ETA:</strong> <span id="eta">---</span></div>
        </div>

        <!-- =============================================
             BRÚJULA
        ============================================== -->

        <div id="compass-panel">
          <div id="compass">🧭</div>

          <div id="heading">0°</div>

          <button id="compass-permission-btn" style="display: none">
            Activar brújula
          </button>
        </div>

        <!-- =============================================
             BUSCADOR
        ============================================== -->

        <div id="destination-search">
          <input
            id="search-input"
            type="text"
            placeholder="Buscar destino..."
            autocomplete="off"
          />

          <button id="search-btn" aria-label="Buscar">🔍</button>

          <div id="search-results"></div>
        </div>

        <!-- =============================================
             CAPA AR
        ============================================== -->

        <div id="ar-poi-layer"></div>

        <!-- =============================================
             NAVEGACIÓN
        ============================================== -->

        <div id="navigation">
          <div id="arrow">↑</div>

          <div id="street">Buscando calle...</div>

          <div id="route-mode">🚶 Caminando</div>

          <div id="instruction">Seleccione un destino</div>
        </div>
      </div>
    </div>

    <!-- =====================================================
     MAPA
====================================================== -->

    <div id="map-container">
      <div id="map"></div>

      <!-- Botones -->

      <button id="map-size-btn" aria-label="Expandir mapa">⛶</button>

      <button id="map-theme-btn" aria-label="Cambiar tema">🌙</button>

      <button id="mode-btn" aria-label="Cambiar modo">🚶</button>

      <button id="clear-route-btn" aria-label="Eliminar ruta">❌</button>

      <button id="recenter-btn" aria-label="Volver a mi ubicación">📍</button>
    </div>

    <!-- =====================================================
     LIBRERÍAS
====================================================== -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Routing -->

    <script src="routing.js"></script>

    <!-- Mapa -->

    <script src="map.js"></script>

    <!-- Aplicación -->

    <script src="app.js"></script>
  </body>
</html>
