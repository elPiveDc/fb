<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Colorea la barra del navegador acorde al HUD oscuro -->
    <meta name="theme-color" content="#000000" />

    <!-- Comportamiento tipo app de pantalla completa en iOS/Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Navigation HUD</title>

    <!-- Preconexión a servicios externos usados por routing.js y map.js
         (achica la latencia del primer request real a cada uno) -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <link
      rel="preconnect"
      href="https://routing.openstreetmap.de"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://nominatim.openstreetmap.org"
      crossorigin
    />

    <!-- Leaflet (versión fija para evitar roturas por updates silenciosos) -->

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- CSS propio -->

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- =================================================
     CAMARA + HUD
================================================== -->

    <div id="camera-container">
      <video id="camera" autoplay playsinline muted></video>

      <div id="overlay">
        <!-- ==========================
             INFORMACION GPS
        =========================== -->

        <div id="info-panel">
          <div>
            <strong>Hora:</strong>

            <span id="time"> --:--:-- </span>
          </div>

          <div>
            <strong>Lat:</strong>

            <span id="latitude"> --- </span>
          </div>

          <div>
            <strong>Lon:</strong>

            <span id="longitude"> --- </span>
          </div>

          <div>
            <strong>Alt:</strong>

            <span id="altitude"> --- </span>
          </div>

          <div>
            <strong>Precisión:</strong>

            <span id="accuracy"> --- </span>
          </div>

          <div>
            <strong>Velocidad:</strong>

            <span id="speed"> --- </span>
          </div>

          <div>
            <strong>Distancia:</strong>

            <span id="distance"> --- </span>
          </div>

          <div>
            <strong>ETA:</strong>

            <span id="eta"> --- </span>
          </div>
        </div>

        <!-- ==========================
             BRUJULA
        =========================== -->

        <div id="compass-panel">
          <div id="compass">🧭</div>

          <div id="heading">0°</div>
        </div>

        <!-- ==========================
            NOTIFICACIONES DE LUGARES CERCANOS
        =========================== -->
        <div id="poi-notifications"></div>

        <!-- ==========================
             NAVEGACION HUD
        =========================== -->

        <div id="navigation">
          <div id="arrow">↑</div>

          <!-- Calle actual -->

          <div id="street">Buscando calle...</div>

          <!-- Modo ruta -->

          <div id="route-mode">🚶 Caminando</div>

          <!-- Instruccion -->

          <div id="instruction">Seleccione un destino</div>
        </div>
      </div>
    </div>

    <!-- =================================================
     MAPA
================================================== -->

    <div id="map-container">
      <div id="map"></div>

      <!-- Expandir mapa -->

      <button id="map-size-btn" aria-label="Expandir o contraer el mapa">
        ⛶
      </button>

      <!-- Cambiar tema -->

      <button id="map-theme-btn" aria-label="Cambiar tema claro u oscuro">
        🌙
      </button>

      <!-- Cambiar modo -->

      <button
        id="mode-btn"
        aria-label="Cambiar entre modo caminando y vehículo"
      >
        🚶
      </button>
    </div>

    <!-- =================================================
     LIBRERIAS
================================================== -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- =================================================
     SISTEMA DE RUTAS
================================================== -->

    <script src="routing.js"></script>

    <!-- =================================================
     LOGICA MAPA
================================================== -->

    <script src="map.js"></script>

    <!-- =================================================
     LOGICA APP
================================================== -->

    <script src="app.js"></script>
  </body>
</html>
