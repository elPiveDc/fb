<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Camera + GPS + Compass</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      #container {
        width: 100vw;
        height: 75vh;
        position: relative;
        overflow: hidden;
        background: black;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #leftPanel {
        position: absolute;

        left: 20px;
        top: 20px;

        color: white;

        background: rgba(0, 0, 0, 0.45);

        padding: 15px;

        border-radius: 12px;

        font-size: 18px;

        line-height: 1.8;

        backdrop-filter: blur(4px);
      }

      #rightPanel {
        position: absolute;

        right: 30px;

        top: 20px;

        width: 170px;

        text-align: center;

        color: white;
      }

      #compass {
        width: 150px;

        height: 150px;

        border-radius: 50%;

        border: 4px solid white;

        background: rgba(0, 0, 0, 0.4);

        position: relative;

        margin: auto;

        transition: transform 0.1s linear;
      }

      #needle {
        position: absolute;

        width: 4px;

        height: 60px;

        background: red;

        left: 50%;

        top: 15px;

        transform: translateX(-50%);
      }

      #north {
        position: absolute;
        top: 5px;
        left: 50%;
        transform: translateX(-50%);
        font-weight: bold;
      }

      #heading {
        margin-top: 15px;
        font-size: 24px;
      }

      #bottom {
        height: 25vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 28px;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <video id="video" autoplay playsinline></video>

      <div id="leftPanel">
        <div><b>Latitud:</b> <span id="lat">---</span></div>

        <div><b>Longitud:</b> <span id="lon">---</span></div>

        <div><b>Precisión:</b> <span id="acc">---</span></div>

        <div><b>Altitud:</b> <span id="alt">---</span></div>
      </div>

      <div id="rightPanel">
        <div id="compass">
          <div id="north">N</div>

          <div id="needle"></div>
        </div>

        <div id="heading">0°</div>
      </div>
    </div>

    <div id="bottom">Camera HUD Demo</div>

    <script>
      const video = document.getElementById("video");

      navigator.mediaDevices
        .getUserMedia({
          video: {
            facingMode: "environment",
          },
          audio: false,
        })
        .then((stream) => {
          video.srcObject = stream;
        })
        .catch((err) => {
          alert(err);
        });

      function updatePosition(pos) {
        document.getElementById("lat").textContent =
          pos.coords.latitude.toFixed(6);

        document.getElementById("lon").textContent =
          pos.coords.longitude.toFixed(6);

        document.getElementById("acc").textContent =
          pos.coords.accuracy.toFixed(1) + " m";

        if (pos.coords.altitude != null)
          document.getElementById("alt").textContent =
            pos.coords.altitude.toFixed(1) + " m";
      }

      navigator.geolocation.watchPosition(updatePosition, console.error, {
        enableHighAccuracy: true,
        maximumAge: 1000,
      });

      function updateCompass(heading) {
        document.getElementById("heading").textContent =
          Math.round(heading) + "°";

        document.getElementById("compass").style.transform =
          "rotate(" + -heading + "deg)";
      }

      if (window.DeviceOrientationEvent) {
        window.addEventListener("deviceorientation", function (e) {
          let heading;

          if (e.webkitCompassHeading) {
            heading = e.webkitCompassHeading;
          } else if (e.alpha !== null) {
            heading = 360 - e.alpha;
          }

          if (heading !== undefined) {
            updateCompass(heading);
          }
        });
      }
    </script>
  </body>
</html>
